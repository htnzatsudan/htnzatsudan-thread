<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>スレッド承認投票場</title>

  <link rel="stylesheet" href="style.css">
</head>


<body>

<header>

  <h1>スレッド承認投票場</h1>

  <div class="tabs">
    <button id="votingTab" class="tab active">
      投票中
    </button>

    <button id="completedTab" class="tab">
      対応済み一覧
    </button>
  </div>

</header>



<main>


<!-- 投票中ページ -->

<section id="votingPage">


  <div class="notice">
    承認派なら 👍　却下派なら 👎を押してね！
  </div>


  <div class="add-area">

    <input 
      id="threadInput"
      type="text"
      placeholder="スレッド名">


    <button id="addButton">
      追加
    </button>

  </div>



  <div id="threadList">

    <!-- スレッド一覧がここに入る -->

  </div>


</section>





<!-- 対応済み一覧ページ -->

<section id="completedPage" style="display:none;">


  <div id="completedList">

    <!-- 対応済みスレッドがここに入る -->

  </div>


</section>



</main>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>


</body>

</html>
